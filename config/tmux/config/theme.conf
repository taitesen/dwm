# ---- Theme ------ #

# modes
setw -g clock-mode-colour colour1
setw -g mode-style 'fg=#000000 bg=#ebbcba bold'

# panes
set -g pane-border-style 'fg=#3b3b3b'
set -g pane-active-border-style 'fg=#3b3b3b'

# statusbar
set-option -g status off

# messages
set -g message-style 'fg=#000000 bg=#ebbcba bold'
